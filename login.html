<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Đăng Nhập | 36t</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; font-family: 'JetBrains Mono', monospace; }
        body { margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #050505, #121212, #1a1a1a); color: #e2e8f0; }
        .glass-panel { background: rgba(255, 255, 255, 0.01); backdrop-filter: blur(10px); padding: 40px 30px; border-radius: 16px; border: 1px solid rgba(255, 255, 255, 0.08); width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.7); }
        h2 { text-align: center; margin: 0 0 30px; font-size: 1.5rem; font-weight: 700; letter-spacing: 1px; color: #ffffff; }
        .grp { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 0.85rem; color: #a3a3a3; }
        input { width: 100%; padding: 12px 15px; background: rgba(0,0,0,0.5); border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 0.95rem; transition: 0.2s; }
        input:focus { border-color: #ffffff; outline: none; }
        button { width: 100%; padding: 14px; background: linear-gradient(90deg, #ffffff, #a3a3a3); color: #000; border: none; border-radius: 8px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: 0.2s; }
        button:hover { background: linear-gradient(90deg, #e5e5e5, #737373); }
        .err { color: #ff4757; font-size: 0.85rem; margin-top: 15px; text-align: center; display: none; }
        .link { text-align: center; margin-top: 25px; font-size: 0.9rem; color: #a3a3a3; }
        .link a { color: #fff; text-decoration: none; font-weight: 700; border-bottom: 1px solid #fff; padding-bottom: 2px; }
        .footer { text-align: center; font-size: 0.7rem; color: #525252; margin-top: 30px; letter-spacing: 2px; }
    </style>
</head>
<body>

<div class="glass-panel">
    <h2>HỆ THỐNG TRUY CẬP</h2>
    <form id="frm">
        <div class="grp">
            <label>Tên đăng nhập</label>
            <input type="text" id="usr" required autocomplete="off">
        </div>
        <div class="grp">
            <label>Mật khẩu</label>
            <input type="password" id="pw" required>
        </div>
        <button type="submit">Xác Thực</button>
        <div class="err" id="err">Tên đăng nhập hoặc mật khẩu không đúng!</div>
    </form>
    <div class="link">Chưa có tài khoản? <a href="register.html">Đăng ký</a></div>
    <div class="footer">© DUYDEV SECURITY</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, setPersistence, browserSessionPersistence, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const cfg = {
        apiKey: "AIzaSyBoF5Ca3sJwwo30xwdYQeMi2xj5UP2WXtk",
        authDomain: "duydev-chat.firebaseapp.com",
        databaseURL: "https://duydev-chat-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "duydev-chat",
        storageBucket: "duydev-chat.firebasestorage.app",
        messagingSenderId: "86082623733",
        appId: "1:86082623733:web:90ad1e48801281cdeb4dbc"
    };

    const au = getAuth(initializeApp(cfg));
    const err = document.getElementById('err');

    document.getElementById('frm').addEventListener('submit', (e) => {
        e.preventDefault();
        
        // Tái tạo lại Email ảo từ Tên đăng nhập người dùng nhập vào
        const safeUsr = document.getElementById('usr').value.trim().replace(/\s+/g, '').toLowerCase();
        const fakeEmail = safeUsr + "@duydev.local";
        const pw = document.getElementById('pw').value;

        setPersistence(au, browserSessionPersistence)
            .then(() => signInWithEmailAndPassword(au, fakeEmail, pw))
            .then(() => window.location.href = "index.html")
            .catch(() => err.style.display = 'block');
    });
</script>
</body>
</html>
